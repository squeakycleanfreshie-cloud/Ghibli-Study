<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghibli Study</title>

<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    background-image: url("bg.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    min-height: 100vh;
    margin: 0;
    padding: 40px;

    font-family: "Zen Old Mincho", serif;
    color: #3B2F2F;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.25);
    z-index: -1;
}

.container {
    max-width: 800px;
    margin: auto;
}

.header {
    background: rgba(255, 255, 255, 0.6);
    border-radius: 18px;
    padding: 14px 18px;
    text-align: center;
    margin-bottom: 15px;
}

h1 {
    color: #283593;
    margin: 0;
}

h4 {
    margin: 6px 0 0;
    color: #2F3A4A;
}

h2 {
    color: white;
}

.panel {
    background: rgba(255, 255, 255, 0.6);
    border-radius: 20px;
    padding: 40px;
    margin-top: 15px;
}

ul {
    list-style: none;
    padding: 0;
}

li {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 12px;
    border-left: 5px solid #3D5A99;
}

input[type="checkbox"] {
    margin-right: 10px;
}

#taskInput {
    width: 70%;
    padding: 12px;
    border: 1px solid #3D5A99;
    border-radius: 10px;
    font-size: 16px;
}

button {
    padding: 12px 18px;
    background: #A4C8E1;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

.timer-widget {
    position: fixed;
    bottom: 30px;
    right: 30px;

    background: rgba(255, 255, 255, 0.85);
    padding: 18px 20px;
    border-radius: 16px;
    text-align: center;
    width: 140px;
}

#time {
    font-size: 20px;
    color: #3D5A99;
    margin: 5px 0;
}

.progress-container {
    margin-top: 20px;
    padding: 12px 18px;
    background: rgba(255, 255, 255, 0.5);
    border-radius: 16px;
}

.progress-text {
    font-size: 12px;
    margin-bottom: 6px;
    color: #2F3A4A;
}

.progress-bar {
    width: 100%;
    height: 8px;
    background: rgba(255, 255, 255, 0.4);
    border-radius: 20px;
    overflow: hidden;
}

#progressFill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #F4D03F, #F7B267);
    border-radius: 20px;
    transition: width 0.4s ease;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Studio Ghibli Study Room</h1>
        <h4>Come Rest & Study — No Procrastinating Allowed</h4>
    </div>

    <h2>To Do List</h2>

    <div class="panel">
        <ul id="taskList"></ul>

        <input id="taskInput" placeholder="Add a task...">
        <button onclick="addTask()">Add Task</button>

        <div class="progress-container">
            <div class="progress-text">Progress</div>
            <div class="progress-bar">
                <div id="progressFill"></div>
            </div>
        </div>
    </div>
</div>

<div class="timer-widget">
    <div>Study Timer</div>
    <div id="time">25:00</div>
    <button onclick="startTimer()">▶</button>
    <button onclick="resetTimer()">↺</button>
</div>

<script>

function addTask() {
    let input = document.getElementById("taskInput");
    let taskText = input.value.trim();

    if (taskText === "") return;

    let list = document.getElementById("taskList");

    let item = document.createElement("li");
    item.innerHTML =
        '<input type="checkbox" onclick="updateProgress()"> ' + taskText;

    list.appendChild(item);

    input.value = "";
    updateProgress();
}

document.getElementById("taskInput")
.addEventListener("keydown", function(event) {
    if (event.key === "Enter") addTask();
});

let timeLeft = 25 * 60;
let timer = null;

function updateDisplay() {
    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;

    document.getElementById("time").innerText =
        `${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;
}

function startTimer() {
    if (timer) return;

    timer = setInterval(() => {
        timeLeft--;
        updateDisplay();

        if (timeLeft <= 0) {
            clearInterval(timer);
            timer = null;
            alert("Study session done 🍵 Take a break!");
        }
    }, 1000);
}

function resetTimer() {
    clearInterval(timer);
    timer = null;
    timeLeft = 25 * 60;
    updateDisplay();
}

updateDisplay();

function updateProgress() {
    let tasks = document.querySelectorAll("#taskList li");
    let checked = document.querySelectorAll("#taskList input:checked");

    let percent = tasks.length ? (checked.length / tasks.length) * 100 : 0;

    document.getElementById("progressFill").style.width = percent + "%";
}

updateProgress();

</script>

</body>
</html>
